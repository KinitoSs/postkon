{% load static %}
<!DOCTYPE html>
<html lang="ru">

        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>
            {% block title %}
            {% endblock title %}
        </title>
        <link rel="stylesheet" href=" {% static 'postkon_webapp/css/base.css' %} media="screen"">
        {% comment %} <script type="text/javascript" src=" {% static 'postkon_webapp/js/jquery.js' %} "  {% endcomment %}

        {% comment %} {% block js_additional %}{% endblock js_additional %} {% endcomment %}
</head>
<body>
    {% block content %}
    {% endblock content %}
</body>
</html>
